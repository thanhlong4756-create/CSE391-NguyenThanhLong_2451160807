<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <h1>My E-Commerce</h1>
        </header>

        <!-- HERO -->
        <section class="hero">

            <div class="hero-text">
                <h2>BIG SALE 50%</h2>
                <p>Mua sắm công nghệ với giá cực sốc</p>
                <button>Shop Now</button>
            </div>

            <!-- BONUS -->
            <div class="featured-product">
                <img src="https://picsum.photos/400/250?1">

                <h3>MacBook Pro</h3>

                <p>35.000.000đ</p>
            </div>

        </section>

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Bộ lọc</h2>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Gaming
            </label>

            <label>
                <input type="checkbox">
                Điện thoại
            </label>

            <label>
                <input type="checkbox">
                Phụ kiện
            </label>

        </aside>

        <!-- MAIN -->
        <main class="products">

            <div class="card">
                <img src="https://picsum.photos/250/180?2">

                <h3>Laptop Dell</h3>

                <p>20.000.000đ</p>

                <button>Mua</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/250/180?3">

                <h3>Gaming Mouse</h3>

                <p>500.000đ</p>

                <button>Mua</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/250/180?4">

                <h3>Mechanical Keyboard</h3>

                <p>1.200.000đ</p>

                <button>Mua</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/250/180?5">

                <h3>Headphone</h3>

                <p>800.000đ</p>

                <button>Mua</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/250/180?6">

                <h3>Monitor</h3>

                <p>4.500.000đ</p>

                <button>Mua</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/250/180?7">

                <h3>Smartphone</h3>

                <p>12.000.000đ</p>

                <button>Mua</button>
            </div>

        </main>

        <!-- ADS -->
        <aside class="ads">

            <h2>Quảng cáo</h2>

            <img src="https://picsum.photos/180/500?8">

        </aside>

        <!-- FOOTER -->
        <footer>
            <p>© 2026 My E-Commerce</p>
        </footer>

    </div>

</body>
</html>
