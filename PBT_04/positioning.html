<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Playground</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">MyShop</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- MAIN -->
    <div class="container">

        <!-- CONTENT -->
        <main>

            <div class="card">
                <div class="badge">HOT</div>

                <img src="https://picsum.photos/300/200" alt="product">

                <h2>Gaming Laptop</h2>

                <p>
                    Laptop hiệu năng cao dành cho học tập và giải trí.
                </p>

                <button>Buy Now</button>
            </div>

            <!-- tạo nhiều content để scroll -->
            <div class="dummy"></div>

        </main>

        <!-- SIDEBAR -->
        <aside>
            <h2>Sidebar</h2>

            <p>Sticky sidebar khi cuộn trang.</p>

            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>Flexbox</li>
                <li>Grid</li>
            </ul>
        </aside>

    </div>

    <!-- SCROLL TOP BUTTON -->
    <div class="scroll-top">
        ↑
    </div>

</body>
</html>
